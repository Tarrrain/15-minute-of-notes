<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Мои заметки</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }
        .container {
            max-width: 700px;
            width: 100%;
        }
        h1 {
            color: #2d3748;
            font-weight: 300;
            margin-bottom: 25px;
            font-size: 28px;
        }
        .input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        .input-area input {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.2s;
            outline: none;
        }
        .input-area input:focus {
            border-color: #4299e1;
            box-shadow: 0 0 0 3px rgba(66,153,225,0.2);
        }
        .input-area button {
            padding: 14px 30px;
            background: #4299e1;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .input-area button:hover {
            background: #3182ce;
        }
        .note {
            background: white;
            padding: 18px 22px;
            border-radius: 12px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: all 0.2s;
        }
        .note:hover {
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .note .content {
            font-size: 16px;
            color: #2d3748;
            flex: 1;
        }
        .note .time {
            font-size: 12px;
            color: #a0aec0;
            margin: 0 15px;
            white-space: nowrap;
        }
        .note .delete-btn {
            background: #fc8181;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 6px 14px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
        }
        .note .delete-btn:hover {
            background: #f56565;
        }
        .empty {
            text-align: center;
            color: #a0aec0;
            padding: 40px 0;
            font-size: 18px;
        }
        .loading {
            text-align: center;
            color: #4299e1;
            padding: 20px 0;
        }
        .error {
            background: #fed7d7;
            color: #c53030;
            padding: 12px 18px;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        .stats {
            font-size: 14px;
            color: #a0aec0;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📝 Заметки</h1>

    <div class="input-area">
        <input type="text" id="noteInput" placeholder="Введите заметку..." />
        <button onclick="addNote()">➕ Добавить</button>
    </div>

    <div id="errorMessage" class="error" style="display:none;"></div>
    <div id="stats" class="stats"></div>
    <div id="loading" class="loading" style="display:none;">Загрузка...</div>
    <div id="notesList"></div>
</div>

<script>
    const API_URL = 'http://localhost:8080/api/notes';

    // При загрузке страницы — получить все заметки
    document.addEventListener('DOMContentLoaded', loadNotes);

    // По Enter тоже добавлять
    document.getElementById('noteInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') addNote();
    });

    function showError(text) {
        const el = document.getElementById('errorMessage');
        el.textContent = text;
        el.style.display = text ? 'block' : 'none';
        if (text) setTimeout(() => { el.style.display = 'none'; }, 4000);
    }

    async function loadNotes() {
        const list = document.getElementById('notesList');
        const loading = document.getElementById('loading');
        const stats = document.getElementById('stats');
        loading.style.display = 'block';

        try {
            const response = await fetch(API_URL);
            if (!response.ok) throw new Error(`Ошибка ${response.status}`);
            const notes = await response.json();
            list.innerHTML = '';
            stats.textContent = notes.length > 0 ? `Всего заметок: ${notes.length}` : '';

            if (notes.length === 0) {
                list.innerHTML = '<div class="empty">📭 Нет заметок. Добавьте первую!</div>';
            } else {
                notes.forEach(note => {
                    const div = document.createElement('div');
                    div.className = 'note';
                    const date = new Date(note.createdAt);
                    const timeStr = date.toLocaleString('ru-RU', {
                        day: '2-digit', month: '2-digit', year: 'numeric',
                        hour: '2-digit', minute: '2-digit'
                    });
                    div.innerHTML = `
                        <span class="content">${escapeHtml(note.content)}</span>
                        <span class="time">${timeStr}</span>
                        <button class="delete-btn" onclick="deleteNote(${note.id})">🗑</button>
                    `;
                    list.appendChild(div);
                });
            }
        } catch (err) {
            showError('Ошибка загрузки заметок: ' + err.message);
            list.innerHTML = '<div class="empty">❌ Не удалось загрузить заметки</div>';
        } finally {
            loading.style.display = 'none';
        }
    }

    async function addNote() {
        const input = document.getElementById('noteInput');
        const content = input.value.trim();
        if (!content) {
            showError('Введите текст заметки!');
            return;
        }

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content })
            });
            if (!response.ok) throw new Error(`Ошибка ${response.status}`);
            input.value = '';
            await loadNotes();
        } catch (err) {
            showError('Не удалось добавить заметку: ' + err.message);
        }
    }

    async function deleteNote(id) {
        if (!confirm('Удалить заметку?')) return;
        try {
            const response = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
            if (!response.ok) throw new Error(`Ошибка ${response.status}`);
            await loadNotes();
        } catch (err) {
            showError('Не удалось удалить заметку: ' + err.message);
        }
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
</script>
</body>
</html>
